
version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8001:8000" 
    env_file:
      - ./backend/.env
    environment: # Make sure this says environment, not env_file!
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
     image: grafana/grafana:latest
     ports:
      - "3000:3000"
     depends_on:
      - prometheus
     environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Default password